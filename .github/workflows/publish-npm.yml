name: Publish NPM

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

# Serialize publish runs so a duplicate trigger (the release tag push and a
# workflow_dispatch firing within seconds of each other) cannot race: the second
# run waits for the first to finish, then the "Check Published Version" step sees
# the version already on npm and skips — instead of E403'ing on a double publish.
concurrency:
  group: publish-npm
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  verify:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ['22', '24']
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          path: surface

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: surface/package-lock.json

      - name: Install
        run: npm ci --no-fund --no-audit
        working-directory: surface

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
        working-directory: surface

      - name: Verify
        run: npm run verify
        working-directory: surface

      - name: Pack Dry Run
        run: npm pack --dry-run
        working-directory: surface

  publish:
    needs: verify
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          path: surface

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          package-manager-cache: false

      - name: Install
        run: npm ci --no-fund --no-audit
        working-directory: surface

      - name: Verify Tag Matches Package Version
        run: |
          PACKAGE_VERSION=$(node -p "JSON.parse(require('node:fs').readFileSync('package.json', 'utf8')).version")
          if [ "v${PACKAGE_VERSION}" != "${GITHUB_REF_NAME}" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match package.json version v${PACKAGE_VERSION}" >&2
            exit 1
          fi
        working-directory: surface

      - name: Verify Tagged Commit Is On Main
        run: |
          git fetch origin main --depth=1
          if ! git merge-base --is-ancestor "${GITHUB_SHA}" "FETCH_HEAD"; then
            echo "Tagged commit ${GITHUB_SHA} is not reachable from the fetched origin/main tip" >&2
            exit 1
          fi
        working-directory: surface

      - name: Check Published Version
        id: published
        run: |
          PACKAGE_NAME=$(node -p "JSON.parse(require('node:fs').readFileSync('package.json', 'utf8')).name")
          PACKAGE_VERSION=$(node -p "JSON.parse(require('node:fs').readFileSync('package.json', 'utf8')).version")
          if npm view "${PACKAGE_NAME}@${PACKAGE_VERSION}" version >/dev/null 2>&1; then
            echo "published=true" >> "${GITHUB_OUTPUT}"
            echo "${PACKAGE_NAME}@${PACKAGE_VERSION} is already published; skipping npm publish."
          else
            echo "published=false" >> "${GITHUB_OUTPUT}"
          fi
        working-directory: surface

      - name: Publish
        if: steps.published.outputs.published != 'true'
        run: npm publish --access public --provenance
        working-directory: surface

  trust-bundle:
    name: Generate and Upload Trust Bundle
    needs: publish
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      # id-token: write is required for Sigstore keyless signing via ambient OIDC.
      # The release script uses it to obtain a Fulcio certificate and record a
      # Rekor transparency log entry.  Signing is fail-open: if the credential is
      # absent the script proceeds and marks the assurance level as unsigned.
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          path: surface

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Install
        run: npm ci --no-fund --no-audit
        working-directory: surface

      - name: Generate and Sign Trust Bundle
        run: node scripts/release-trust-bundle.mjs --out /tmp/surface-trust-bundle
        working-directory: surface

      - name: Verify signature with cosign (fail-closed)
        # Signing is fail-open; verification of a produced signature is fail-closed.
        # A bad signature is worse than none — if signing ran and produced a bundle,
        # we must confirm cosign can verify it before uploading to the release.
        # Skip this step only when signing was skipped (no sigstore bundle written).
        if: hashFiles('/tmp/surface-trust-bundle/trust-bundle.sigstore.json') != ''
        run: |
          cosign verify-blob \
            --bundle /tmp/surface-trust-bundle/trust-bundle.sigstore.json \
            --certificate-identity "https://github.com/${{ github.repository }}/.github/workflows/publish-npm.yml@${{ github.ref }}" \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \
            /tmp/surface-trust-bundle/trust-bundle.json

      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          # Create release if it doesn't exist yet (idempotent)
          gh release view "${TAG}" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1 \
            || gh release create "${TAG}" --repo "$GITHUB_REPOSITORY" \
               --title "${TAG}" --notes "Release ${TAG}" --verify-tag
          # Always upload the core bundle and report.
          gh release upload "${TAG}" \
            /tmp/surface-trust-bundle/trust-bundle.json \
            /tmp/surface-trust-bundle/trust-report.json \
            --repo "$GITHUB_REPOSITORY" \
            --clobber
          # Upload signed artifacts only when signing succeeded (files exist).
          if [ -f /tmp/surface-trust-bundle/trust-bundle.dsse.json ]; then
            gh release upload "${TAG}" \
              /tmp/surface-trust-bundle/trust-bundle.dsse.json \
              --repo "$GITHUB_REPOSITORY" \
              --clobber
          fi
          if [ -f /tmp/surface-trust-bundle/trust-bundle.sigstore.json ]; then
            gh release upload "${TAG}" \
              /tmp/surface-trust-bundle/trust-bundle.sigstore.json \
              --repo "$GITHUB_REPOSITORY" \
              --clobber
          fi
        working-directory: surface
