name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # Suite-wide secret-scan gate, one normative source (kontourai/.github).
  secret-scan:
    name: Secret Scan
    uses: kontourai/.github/.github/workflows/secret-scan.yml@main
    permissions:
      contents: read

  verify:
    name: Verify (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        node-version:
          - 22
          - 24

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          path: surface

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: surface/package-lock.json

      - name: Install dependencies
        run: npm ci --no-fund --no-audit
        working-directory: surface

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
        working-directory: surface

      - name: Verify
        run: npm run verify
        working-directory: surface
